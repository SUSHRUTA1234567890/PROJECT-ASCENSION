<!DOCTYPE html>
<html>
<head>
    <title>Project Ascension</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #000; color: #fff; }
        canvas { display: block; }
        #hud { position: fixed; top: 20px; left: 20px; color: #00ff88; z-index: 100; font-family: monospace; }
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2em; color: #00ff88; z-index: 99; }
        #terminalWindow { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 400px; background: #0a0a0a; border: 2px solid #00ff88; display: none; flex-direction: column; z-index: 500; }
        #terminalContent { flex: 1; padding: 15px; color: #00ff88; font-family: monospace; overflow-y: auto; }
        #closeTerminal { padding: 10px; background: #00ff88; color: #000; border: none; cursor: pointer; }
        #victoryScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #00ffff, #0088ff); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; text-align: center; }
    </style>
</head>
<body>

<div id="hud">
    <div>Health: 100</div>
    <div>Objective: Find the Keycard</div>
</div>

<div id="crosshair">+</div>

<div id="terminalWindow">
    <div style="padding: 10px; background: rgba(0, 255, 136, 0.2); border-bottom: 1px solid #00ff88;">PROJECT ASCENSION TERMINAL</div>
    <div id="terminalContent">Loading...</div>
    <button id="closeTerminal">Close</button>
</div>

<div id="victoryScreen">
    <h1>WELCOME TO PROJECT ASCENSION</h1>
    <p>Energy cannot escape.</p>
    <button onclick="location.reload()" style="padding: 15px 40px; background: #00ffff; color: #000; border: none; cursor: pointer; font-size: 1.2em; margin-top: 20px;">Play Again</button>
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@r127/build/three.module.js';
import { PointerLockControls } from 'https://unpkg.com/three@r127/examples/jsm/controls/PointerLockControls.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.set(0, 1.6, 10);
scene.background = new THREE.Color(0x1a1a1a);
scene.add(new THREE.AmbientLight(0x666666));

const controls = new PointerLockControls(camera, document.body);
let canMove = false;
let hasKeycard = false;
const keys = {};

// Create hallway
function createHallway() {
    const floor = new THREE.Mesh(
        new THREE.BoxGeometry(20, 1, 100),
        new THREE.MeshStandardMaterial({ color: 0xb8b27a })
    );
    floor.position.y = -0.5;
    scene.add(floor);

    const ceiling = new THREE.Mesh(
        new THREE.BoxGeometry(20, 1, 100),
        new THREE.MeshStandardMaterial({ color: 0xcccccc })
    );
    ceiling.position.y = 3.5;
    scene.add(ceiling);

    const wall1 = new THREE.Mesh(
        new THREE.BoxGeometry(1, 4, 100),
        new THREE.MeshStandardMaterial({ color: 0xffffcc })
    );
    wall1.position.x = -10;
    scene.add(wall1);

    const wall2 = new THREE.Mesh(
        new THREE.BoxGeometry(1, 4, 100),
        new THREE.MeshStandardMaterial({ color: 0xffffcc })
    );
    wall2.position.x = 10;
    scene.add(wall2);

    for (let i = 0; i < 8; i++) {
        const light = new THREE.PointLight(0xffffff, 2, 50);
        light.position.set(0, 2.5, -50 + i * 15);
        scene.add(light);
    }
}

// Create terminal
function createTerminal(x, z, logIndex) {
    const terminal = new THREE.Mesh(
        new THREE.BoxGeometry(1, 1.5, 0.3),
        new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00aa44 })
    );
    terminal.position.set(x, 1.5, z);
    terminal.logIndex = logIndex;
    scene.add(terminal);
    return terminal;
}

// Create reactor
function createReactor() {
    const reactor = new THREE.Mesh(
        new THREE.IcosahedronGeometry(3, 4),
        new THREE.MeshStandardMaterial({ color: 0x0088ff, emissive: 0x00ffff })
    );
    reactor.position.set(0, 1.5, -80);
    reactor.isReactor = true;
    scene.add(reactor);
    
    const light = new THREE.PointLight(0x00ffff, 4, 100);
    light.position.copy(reactor.position);
    scene.add(light);
    
    return reactor;
}

// Create keycard
function createKeycard() {
    const keycard = new THREE.Mesh(
        new THREE.BoxGeometry(0.2, 0.1, 0.5),
        new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff6600 })
    );
    keycard.position.set(-8, 1, -30);
    keycard.isKeycard = true;
    scene.add(keycard);
    return keycard;
}

const logs = [
    "LOG 001\nPROJECT ASCENSION INITIATED\nObjective: Human consciousness integration",
    "LOG 021\nSubject cognitive synchronization successful.",
    "LOG 300\nYou are Explorer. You believe you can escape. You cannot."
];

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const objects = [];

createHallway();
objects.push(createTerminal(-8, -20, 0));
objects.push(createTerminal(8, -20, 1));
objects.push(createTerminal(0, -50, 2));
objects.push(createKeycard());
objects.push(createReactor());

// Start game immediately
controls.lock();
canMove = true;

document.addEventListener('pointerlockchange', () => {
    canMove = document.pointerLockElement === document.body;
});

document.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'KeyE') {
        document.getElementById('terminalWindow').style.display = 'none';
    }
});

document.addEventListener('keyup', (e) => {
    keys[e.code] = false;
});

document.addEventListener('click', () => {
    if (!canMove) return;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(objects);
    if (intersects.length > 0) {
        const obj = intersects[0].object;
        if (obj.logIndex !== undefined) {
            document.getElementById('terminalContent').textContent = logs[obj.logIndex];
            document.getElementById('terminalWindow').style.display = 'flex';
        } else if (obj.isKeycard) {
            hasKeycard = true;
            obj.visible = false;
            document.getElementById('terminalContent').textContent = 'KEYCARD ACQUIRED\nAccess to Reactor granted.';
            document.getElementById('terminalWindow').style.display = 'flex';
        } else if (obj.isReactor) {
            if (hasKeycard) {
                document.getElementById('victoryScreen').style.display = 'flex';
                canMove = false;
            }
        }
    }
});

document.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

document.getElementById('closeTerminal').onclick = () => {
    document.getElementById('terminalWindow').style.display = 'none';
};

function animate() {
    requestAnimationFrame(animate);
    
    if (canMove && controls.isLocked) {
        const move = new THREE.Vector3();
        if (keys['KeyW']) move.z -= 0.15;
        if (keys['KeyS']) move.z += 0.15;
        if (keys['KeyA']) move.x -= 0.15;
        if (keys['KeyD']) move.x += 0.15;
        if (move.length() > 0) {
            move.applyAxisAngle(new THREE.Vector3(0, 1, 0), controls.getObject().rotation.y);
            camera.position.add(move);
        }
    }
    
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>

</body>
</html>
